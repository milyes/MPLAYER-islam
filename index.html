<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم - Lecteur Multimédia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Amiri', system-ui, sans-serif; }
    .quran-text { font-size: 1.35rem; line-height: 2.3; }
    audio { width: 100%; }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-950 to-teal-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto p-6">
    <!-- En-tête -->
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-emerald-300 mb-3">ﷺ القرآن الكريم ﷺ</h1>
      <p class="text-emerald-200 text-xl">Lecteur Audio • Mishary Rashid Al-Afasy • Assistant Gemini IA</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- Lecteur Audio -->
      <div class="lg:col-span-7 bg-zinc-900 rounded-3xl shadow-2xl border border-emerald-800 overflow-hidden">
        <div class="bg-emerald-900 p-8">
          <div class="flex items-center gap-5">
            <i class="fa-solid fa-book-quran text-6xl text-emerald-300"></i>
            <div class="flex-1">
              <h2 id="currentSurahName" class="text-3xl font-semibold">١ - الفاتحة (Al-Fatiha)</h2>
              <p id="currentReciter" class="text-emerald-200">Mishary Rashid Al-Afasy</p>
            </div>
          </div>
          <audio id="quranAudio" class="mt-8 w-full" controls></audio>
        </div>

        <!-- Liste des sourates -->
        <div class="p-6">
          <h3 class="text-emerald-400 font-medium mb-5 flex items-center gap-2">
            <i class="fa-solid fa-list-ul"></i> Sourates disponibles
          </h3>
          <div id="surahList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[450px] overflow-y-auto pr-2"></div>
        </div>
      </div>

      <!-- Chat Gemini -->
      <div class="lg:col-span-5 bg-zinc-900 rounded-3xl shadow-2xl border border-emerald-800 flex flex-col h-[650px]">
        <div class="bg-emerald-900 px-6 py-5 flex items-center gap-3">
          <i class="fa-solid fa-robot text-4xl text-emerald-300"></i>
          <div>
            <h2 class="font-semibold text-xl">Assistant Coranique Intelligent</h2>
            <p class="text-sm text-emerald-300">Posez vos questions pendant l'écoute</p>
          </div>
        </div>

        <div id="chat" class="flex-1 p-6 overflow-y-auto bg-zinc-950 space-y-6"></div>

        <div class="p-6 bg-zinc-900 border-t border-emerald-800">
          <input id="apiKey" type="text" value="AIzaSyDfWgN1jQRv3ejkmcQOrUEWvhSbA4OZnOg"
                 class="w-full bg-zinc-800 text-sm px-5 py-3 rounded-2xl mb-4 text-center focus:outline-none focus:ring-2 focus:ring-emerald-500">
          
          <div class="flex gap-3">
            <input id="userInput" type="text" 
                   class="flex-1 bg-zinc-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                   placeholder="Exemple : Explique la sourate Al-Fatiha" 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" 
                    class="bg-emerald-600 hover:bg-emerald-500 px-8 rounded-2xl transition">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Liste des sourates avec liens audio directs (Mishary Al-Afasy 128kbps)
    const surahs = [
      {id: 1,  name: "١ - الفاتحة",     french: "Al-Fatiha",   url: "https://everyayah.com/data/Alafasy_128kbps/001001.mp3"},
      {id: 2,  name: "٢ - البقرة",      french: "Al-Baqara",   url: "https://everyayah.com/data/Alafasy_128kbps/002001.mp3"},
      {id: 3,  name: "٣ - آل عمران",    french: "Al Imran",    url: "https://everyayah.com/data/Alafasy_128kbps/003001.mp3"},
      {id: 36, name: "٣٦ - يس",         french: "Ya-Sin",      url: "https://everyayah.com/data/Alafasy_128kbps/036001.mp3"},
      {id: 55, name: "٥٥ - الرحمن",     french: "Ar-Rahman",   url: "https://everyayah.com/data/Alafasy_128kbps/055001.mp3"},
      {id: 67, name: "٦٧ - الملك",      french: "Al-Mulk",     url: "https://everyayah.com/data/Alafasy_128kbps/067001.mp3"},
      {id: 112,name: "١١٢ - الإخلاص",   french: "Al-Ikhlas",   url: "https://everyayah.com/data/Alafasy_128kbps/112001.mp3"},
      {id: 113,name: "١١٣ - الفلق",     french: "Al-Falaq",    url: "https://everyayah.com/data/Alafasy_128kbps/113001.mp3"},
      {id: 114,name: "١١٤ - الناس",     french: "An-Nas",      url: "https://everyayah.com/data/Alafasy_128kbps/114001.mp3"}
    ];

    const audio = document.getElementById('quranAudio');
    const surahListDiv = document.getElementById('surahList');
    let currentSurah = null;

    // Générer la liste des sourates
    surahs.forEach(s => {
      const div = document.createElement('div');
      div.className = "bg-zinc-800 hover:bg-emerald-900 p-4 rounded-2xl cursor-pointer transition flex justify-between items-center";
      div.innerHTML = `
        <div>
          <span class="font-bold text-emerald-400">${s.id}</span> 
          <span class="font-medium">${s.name}</span><br>
          <span class="text-xs text-zinc-400">${s.french}</span>
        </div>
        <i class="fa-solid fa-play text-emerald-400"></i>
      `;
      div.onclick = () => {
        currentSurah = s;
        document.getElementById('currentSurahName').textContent = `${s.id} - ${s.french}`;
        audio.src = s.url;
        audio.play();
      };
      surahListDiv.appendChild(div);
    });

    // Chat Gemini
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const apiKeyInput = document.getElementById('apiKey');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      msg.innerHTML = isUser 
        ? `<div class="max-w-[80%] bg-emerald-600 px-5 py-3 rounded-3xl rounded-tr-none">${text}</div>`
        : `<div class="max-w-[80%] bg-zinc-800 px-5 py-3 rounded-3xl rounded-tl-none quran-text">${text}</div>`;
      chatDiv.appendChild(msg);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    window.onload = () => {
      addMessage("السلام عليكم ورحمة الله وبركاته<br><br>Bienvenue dans le lecteur du Coran !<br>Choisissez une sourate et posez vos questions à Gemini.", false);
      // Lecture par défaut : Al-Fatiha
      currentSurah = surahs[0];
      document.getElementById('currentSurahName').textContent = "١ - الفاتحة (Al-Fatiha)";
      audio.src = surahs[0].url;
    };

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        alert("Veuillez entrer votre clé Gemini API");
        return;
      }

      addMessage(question, true);
      input.value = "";

      const loading = document.createElement('div');
      loading.id = "loading";
      loading.className = "flex justify-start";
      loading.innerHTML = `<div class="bg-zinc-800 px-5 py-3 rounded-3xl"><i class="fa-solid fa-spinner fa-spin"></i> Gemini réfléchit...</div>`;
      chatDiv.appendChild(loading);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ 
              text: `Tu es un savant musulman expert du Coran. Réponds en français avec respect et précision. 
              Contexte : Sourate en cours : ${currentSurah ? currentSurah.french : 'non précisée'}.
              Question : ${question}` 
            }] }]
          })
        });

        const data = await res.json();
        document.getElementById("loading").remove();

        if (data.candidates && data.candidates[0]) {
          let answer = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
          addMessage(answer, false);
        } else {
          addMessage("Désolé, aucune réponse valide de Gemini.", false);
        }
      } catch (e) {
        document.getElementById("loading").remove();
        addMessage("Erreur : Vérifiez votre clé API et votre connexion.", false);
      }
    }
  </script>
</body>
</html>
